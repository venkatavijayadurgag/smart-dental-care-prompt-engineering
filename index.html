<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Dental Care</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  
  <!-- HERO SECTION -->
  <section class="hero">
    <div class="hero-content">
      <h1>Dental care that respects your time</h1>
      <p>
        A calm, modern dental clinic experience designed to make
        appointments simple, fast, and stress-free.
      </p>
      <a href="#appointment" class="primary-btn">Book Appointment</a>
    </div>
  </section>

  <!-- SERVICES -->
  <section class="services">
    <h2>Our Services</h2>
    <div class="service-cards">
      <div class="card">General Checkup</div>
      <div class="card">Teeth Cleaning</div>
      <div class="card">Root Canal Treatment</div>
      <div class="card">Braces & Alignment</div>
    </div>
  </section>

  <!-- APPOINTMENT -->
  <section id="appointment" class="appointment">
    <h2>Book an Appointment</h2>

    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="tel" placeholder="Phone Number" required>
      <input type="date" required>

      <select id="service" required>
        <option value="">Select Service</option>
        <option value="500">General Checkup</option>
        <option value="800">Teeth Cleaning</option>
        <option value="2500">Root Canal</option>
        <option value="4000">Braces</option>
      </select>

      <p id="cost">Estimated Cost: ₹0</p>

      <button type="submit">Confirm Appointment</button>
    </form>
  </section>

  <script src="script.js"></script>
</body>
</html>
